name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test
      # Dogfood: audit our own pubspec; fails the build on findings.
      - run: dart run bin/pubspec_doctor.dart --fail-on-stale
      # Lower-bound check: the code must analyze and pass tests against the
      # oldest versions the constraints admit (pub.dev scores this).
      - run: dart pub downgrade
      - run: dart analyze --fatal-infos
      - run: dart test
