name: pubspec_doctor
description: >-
  Audit pubspec.yaml dependencies and assets: unused, discontinued and stale
  packages, wrong sections, leftover overrides, missing assets. Built for CI.
version: 0.9.0
repository: https://github.com/PopovVA/pubspec_doctor

environment:
  sdk: ^3.5.0

executables:
  pubspec_doctor:

dependencies:
  args: ^2.7.0
  http: ^1.6.0
  pub_semver: ^2.2.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.4

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
